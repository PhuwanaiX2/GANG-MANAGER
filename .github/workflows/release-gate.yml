name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_attendance_smoke:
        description: Run attendance E2E smoke checks (requires configured repository secrets)
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXTAUTH_SECRET: ci-nextauth-secret
  DISCORD_CLIENT_ID: ci-discord-client-id
  DISCORD_CLIENT_SECRET: ci-discord-client-secret
  DISCORD_BOT_TOKEN: ci-discord-bot-token
  BACKUP_CHANNEL_ID: ci-backup-channel
  STRIPE_SECRET_KEY: sk_test_ci
  STRIPE_WEBHOOK_SECRET: whsec_ci
  STRIPE_PRICE_PREMIUM: price_ci_premium_monthly
  STRIPE_PRICE_PREMIUM_YEARLY: price_ci_premium_yearly
  TURSO_DATABASE_URL: libsql://ci-placeholder.turso.io
  TURSO_AUTH_TOKEN: ci-placeholder-token
  ADMIN_DISCORD_IDS: ci-admin

jobs:
  quality:
    name: Web and Bot Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production environment contract
        run: npm run validate:env:prod

      - name: Lint web app
        run: npm run lint -w apps/web

      - name: Run web unit and API tests
        run: npm test

      - name: Build all workspaces
        run: npm run build

  attendance-smoke:
    name: Attendance E2E Smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_attendance_smoke) || vars.RUN_ATTENDANCE_E2E == '1' }}
    env:
      PLAYWRIGHT_RUN_ATTENDANCE_SMOKE: '1'
      E2E_BASE_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ${{ secrets.E2E_NEXTAUTH_SECRET }}
      E2E_GANG_ID: ${{ secrets.E2E_GANG_ID }}
      E2E_DISCORD_ID: ${{ secrets.E2E_DISCORD_ID }}
      E2E_DISCORD_ACCESS_TOKEN: ${{ secrets.E2E_DISCORD_ACCESS_TOKEN }}
      TURSO_DATABASE_URL: ${{ secrets.E2E_TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.E2E_TURSO_AUTH_TOKEN }}
      DISCORD_CLIENT_ID: ${{ secrets.E2E_DISCORD_CLIENT_ID }}
      DISCORD_CLIENT_SECRET: ${{ secrets.E2E_DISCORD_CLIENT_SECRET }}
      DISCORD_BOT_TOKEN: ${{ secrets.E2E_DISCORD_BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate attendance smoke secrets
        shell: bash
        run: |
          missing=0
          for key in NEXTAUTH_SECRET E2E_GANG_ID E2E_DISCORD_ID TURSO_DATABASE_URL TURSO_AUTH_TOKEN DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET DISCORD_BOT_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required CI secret/env: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run attendance E2E smoke
        run: npm run test:e2e -w apps/web
