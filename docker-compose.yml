services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: ${LOCAL_NEXTAUTH_URL:-http://localhost:3000}
    restart: always

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    ports:
      - "${BOT_PORT:-8080}:${BOT_PORT:-8080}"
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: ${LOCAL_NEXTAUTH_URL:-http://localhost:3000}
    restart: always

