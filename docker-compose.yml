services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    ports:
      - "${BOT_PORT:-8080}:${BOT_PORT:-8080}"
    env_file:
      - .env
    restart: always

